# Web scraping configuration

# Game date spelled in different ways in each stat_type table
game_date_header_variations:
  - Game Date
  - Game_Date
  - GAME DATE
  - "Game\xa0Date"

# Scraping settings
full_scrape: False
start_season: 2006
off_season_start_month: 8
regular_season_start_month: 10
play_in_month: 4  # fallback when season not in play_in_start_dates

# Exact play-in tournament start dates per season (MM/DD/YYYY).
# Used instead of play_in_month when available. Update each year.
play_in_start_dates:
  "2021-22": "04/12/2022"
  "2022-23": "04/11/2023"
  "2023-24": "04/16/2024"
  "2024-25": "04/15/2025"
  "2025-26": "04/15/2026"  # approximate - verify and update

# Validation settings
enable_validation_scraping: False # Set to False to skip validation data collection
validation_data_file: validation_data.csv  # File to store validation data from basketball-reference.com
team_mapping_file: team_mapping.yaml  # Team ID to abbreviation mapping for basketball-reference.com

# NBA URLs
nba_boxscores_url: https://www.nba.com/stats/teams/boxscores
nba_schedule_url: https://www.nba.com/schedule

# Season types
regular_season_text: Regular+Season
play_in_season_text: PlayIn
playoffs_season_text: Playoffs

# Stat types to scrape
stat_types:
  - traditional
  - advanced
  - four-factors
  - misc
  - scoring

# CSS class names for scraping
table_class_name: Crom_table__
pagination_class_name: Pagination_pageDropdown__
dropdown_class_name: DropDown_select__
teams_and_games_class_name: Anchor_anchor__
games_per_day_class_name: ScheduleDay_sdGames__
day_class_name: ScheduleDay_sdDay__
teams_links_class_name: Anchor_anchor__ Link_styled__
game_links_class_name: Anchor_anchor__ TabLink_link__
no_data_class_prefix: NoDataMessage_base__  # hash suffix intentionally omitted - scraper matches by prefix to survive NBA site redeploys

# Text to find links that contain game ids
schedule_preview_text: Preview

# Schedule scraper column names - 
# these are the columns created when converting lists to dataframes for todays_matchups_file and todays_games_ids_file
schedule_home_team_id_column: home_id
schedule_visitor_team_id_column: visitor_id
schedule_game_id_column: game_id

# Timeout settings if page or dynamic content (tables) take too long to load
page_load_timeout: 30
dynamic_content_timeout: 30 

# Retry settings
max_retries: 2
retry_delay: 2
wait_time: 10


# Browser options (first is the default, second is the fallback)
browsers:
  - chrome
  - firefox

  # Chrome-specific options
chrome_options:
  --headless: null  # Old Chromium doesn't support --headless=new
  --no-sandbox: null
  --disable-dev-shm-usage: null
  --disable-gpu: null
  --disable-software-rasterizer: null  # Required for GitHub Actions
  --disable-setuid-sandbox: null  # Required for containerized environments
  --disable-extensions: null
  --disable-popup-blocking: null
  --disable-notifications: null
  --disable-3d-apis: null
  --disable-blink-features=AutomationControlled: null
  --window-size=1920,1080: null  # Better than start-maximized for headless
  --user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/58.0.3029.110 Safari/537.3"



# Firefox-specific options
firefox_options:
  --headless: null
  --disable-blink-features=AutomationControlled: null
  --user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:53.0) Gecko/20100101 Firefox/53.0"

